# Approve native build scripts required by the toolchain:
#   esbuild  — Astro/Vite bundling
#   sharp    — build-time image optimization (astro:assets)
#   workerd  — local Cloudflare Worker runtime (platformProxy / wrangler dev)
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - lucide-react@1.23.0

# eslint-plugin-jsx-a11y has not yet widened its peer range to ESLint 10, but
# the current plugin passes this repository's full React accessibility lint.
peerDependencyRules:
  allowedVersions:
    "eslint-plugin-jsx-a11y>eslint": "10"

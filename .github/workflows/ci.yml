name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cloudflare binding typegen
        run: pnpm cf-typegen:check

      - name: Formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Astro check
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build artifact and performance checks
        run: pnpm verify:build

      - name: Dependency audit
        run: pnpm audit
